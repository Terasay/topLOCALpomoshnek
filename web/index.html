<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>LOCAL Помощник</title>
  <link rel="stylesheet" href="/web/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">LOCAL</div>
      <div class="subtitle">Помощник ПК</div>

      <div class="panel">
        <label>
          <input type="checkbox" id="useScreenshot">
          Отправлять скриншот
        </label>

        <label>
          <input type="checkbox" id="autoAi">
          Автовыполнение Qwen
        </label>
      </div>

      <div class="hint">
        Быстрые команды выполняются без подтверждения.
      </div>
    </aside>

    <main class="main">
      <header>
        <h1>Локальный ассистент</h1>
        <p>Голос потом прикрутим. Пока пишем руками, как в эпоху цифрового средневековья.</p>
      </header>

      <section id="log" class="log"></section>

      <footer>
        <input id="commandInput" placeholder="Например: нажми пуск" autofocus />
        <button id="sendBtn">Выполнить</button>
      </footer>
    </main>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
